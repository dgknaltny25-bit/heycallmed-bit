<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopUltra</title>

<style>
:root {
  --bg:#f5f5f5;
  --card:#fff;
  --text:#000;
}

.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  background:orange;
  color:white;
  padding:12px;
  text-align:center;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:var(--card);
  padding:10px;
  border-radius:10px;
}

.price { color:orange; font-weight:bold; }

/* BUTTON */
button {
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* PANEL */
.panel {
  position:fixed;
  right:-100%;
  top:0;
  width:100%;
  height:100%;
  background:var(--card);
  transition:0.3s;
  padding:20px;
  overflow:auto;
}

.active { right:0; }

/* BOTTOM */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:var(--card);
  padding:10px;
}

/* SEARCH */
.search input {
  width:95%;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
🛍️ ShopUltra 
<button onclick="toggleMode()">🌙</button>
</div>

<!-- LOGIN -->
<div id="login" style="text-align:center;padding:20px;">
<input id="username" placeholder="Kullanıcı"><br><br>
<button onclick="login()">Giriş</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="search">
<input placeholder="Ara..." onkeyup="searchProduct(this.value)">
</div>

<div class="products" id="products"></div>

</div>

<!-- CART -->
<div class="panel" id="cart"></div>

<!-- PAYMENT -->
<div class="panel" id="payment">
<h2>💳 Ödeme</h2>
<input placeholder="Kart No"><br><br>
<input placeholder="Ad Soyad"><br><br>
<button onclick="completeOrder()">Öde</button>
</div>

<!-- ORDERS -->
<div class="panel" id="orders"></div>

<!-- PROFILE -->
<div class="panel" id="profile"></div>

<!-- BOTTOM -->
<div class="bottom">
<div onclick="showProducts()">🏠</div>
<div onclick="toggle('cart')">🛒</div>
<div onclick="toggle('orders')">📦</div>
<div onclick="toggle('profile')">👤</div>
</div>

<script>
let products = [
  {name:"iPhone 13", price:25000},
  {name:"Samsung S22", price:22000},
  {name:"Xiaomi Note 12", price:15000}
];

let cart = JSON.parse(localStorage.getItem("cart"))||[];
let orders = JSON.parse(localStorage.getItem("orders"))||[];
let user = localStorage.getItem("user")||"";

function login(){
  user=document.getElementById("username").value;
  localStorage.setItem("user",user);
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

function renderProducts(list){
  let html="";
  list.forEach(p=>{
    html+=`
    <div class="card">
      <h3>${p.name}</h3>
      <div>⭐⭐⭐⭐☆</div>
      <div class="price">${p.price} TL</div>
      <button onclick="addToCart('${p.name}',${p.price})">Sepet</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function addToCart(name,price){
  let item=cart.find(x=>x.name===name);
  if(item) item.qty++;
  else cart.push({name,price,qty:1});
  localStorage.setItem("cart",JSON.stringify(cart));
}

function renderCart(){
  let html="<h2>Sepet</h2>"; let total=0;
  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    html+=`${c.name} (${c.qty}) - ${c.price*c.qty} TL
    <button onclick="changeQty(${i},1)">+</button>
    <button onclick="changeQty(${i},-1)">-</button><br>`;
  });
  html+=`<h3>Toplam: ${total}</h3>
  <button onclick="goPayment()">Ödeme</button>
  <button onclick="toggle('cart')">Kapat</button>`;
  document.getElementById("cart").innerHTML=html;
}

function changeQty(i,val){
  cart[i].qty+=val;
  if(cart[i].qty<=0) cart.splice(i,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function goPayment(){
  toggle('cart'); toggle('payment');
}

function completeOrder(){
  orders.push([...cart]);
  localStorage.setItem("orders",JSON.stringify(orders));
  cart=[]; localStorage.setItem("cart","[]");
  alert("Sipariş tamamlandı!");
  toggle('payment');
}

function renderOrders(){
  let html="<h2>Siparişler</h2>";
  orders.forEach((o,i)=>{
    html+=`Sipariş ${i+1}: ${o.map(x=>x.name+"("+x.qty+")").join(", ")}<br>`;
  });
  html+=`<button onclick="toggle('orders')">Kapat</button>`;
  document.getElementById("orders").innerHTML=html;
}

function renderProfile(){
  document.getElementById("profile").innerHTML=
  `<h2>Profil</h2>Hoş geldin: ${user}<br><button onclick="toggle('profile')">Kapat</button>`;
}

function toggle(id){
  document.getElementById(id).classList.toggle("active");
  if(id==="cart") renderCart();
  if(id==="orders") renderOrders();
  if(id==="profile") renderProfile();
}

function searchProduct(text){
  let f=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));
  renderProducts(f);
}

function showProducts(){ renderProducts(products); }

function toggleMode(){
  document.body.classList.toggle("dark");
}

renderProducts(products);
</script>

</body>
</html>
